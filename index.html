    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            letter-spacing: 10px;
            color: #ffffff;
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
        }

        /* Общий стиль карточек с неоновой рамкой как на скрине */
        .card {
            background-color: #000000;
            width: 300px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Фиолетовая карточка (Telegram X) */
        .card.purple {
            border: 3px solid #bc13fe;
            box-shadow: inset 0 0 10px #bc13fe, 0 0 15px #bc13fe;
        }

        /* Зеленая карточка (Opera Mini или другое) */
        .card.green {
            border: 3px solid #4ade80;
            box-shadow: inset 0 0 10px #4ade80, 0 0 15px #4ade80;
        }

        .app-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        p {
            font-size: 0.9em;
            color: #cccccc;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .purple .btn {
            background-color: #bc13fe;
            color: #fff;
        }

        .green .btn {
            background-color: #4ade80;
            color: #000;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .file-info {
            margin-top: 10px;
            font-size: 0.7em;
            color: #555;
            font-family: monospace;
        }
    </style>
</head>
